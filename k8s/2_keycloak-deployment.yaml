apiVersion: apps/v1
kind: Deployment
metadata:
      name: keycloak
spec:
      replicas: 1
      selector:
            matchLabels:
                  app: keycloak
      template:
            metadata:
                  labels:
                        app: keycloak
            spec:
                  containers:
                        - name: keycloak
                          image: quay.io/keycloak/keycloak:22.0.0
                          env:
                                - name: KEYCLOAK_ADMIN
                                  value: "admin"
                                - name: KEYCLOAK_ADMIN_PASSWORD
                                  value: "admin"
                                - name: KC_HTTP_RELATIVE_PATH
                                  value: "/auth"
                          args: ["start-dev", "--import-realm"]
                          ports:
                                - containerPort: 8080
                          volumeMounts:
                                - name: realm-config
                                  mountPath: /opt/keycloak/data/import
                  volumes:
                        - name: realm-config
                          configMap:
                                name: keycloak-realm-config
